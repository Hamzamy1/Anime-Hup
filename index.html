<!DOCTYPE html>
<html lang="ar" dir="rtl" style="color-scheme:dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Anime Hub - شاهد الأنمي أونلاين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Noto+Sans+Arabic:wght@300..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg2:#0a0a0f;--bg3:#111118;--card-bg:#0d0d14;--card-border:rgba(255,255,255,0.06);--card-hover-border:rgba(255,255,255,0.12);--prim:#7c3aed;--prim2:#a78bfa;--acc:#6366f1;--green:#2fc867;--green-bg:rgba(47,200,103,0.12);--gold:#fbbf24;--text:#f0f0f5;--text2:#a0a0b8;--text3:#6a6a82;--radius:12px;--radius-sm:8px;--nav-h:64px;--ease:cubic-bezier(0.22,1,0.36,1);--swiper-navigation-color:#fff}
html{scroll-behavior:smooth}
body{font-family:'Bricolage Grotesque','Noto Sans Arabic',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}
::selection{background:rgba(124,58,237,0.3);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:20px}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit;outline:none}

/* ── Layout ── */
.app{min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04);transition:background .3s}
header.scrolled{background:rgba(0,0,0,0.95)}
.header-inner{display:flex;align-items:center;gap:12px;width:100%;max-width:1400px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo img{height:40px;width:auto;object-fit:contain}
.logo span{font-size:1.1em;font-weight:700;color:#fff;display:none}
.nav-links{display:none;align-items:center;gap:4px;margin:0 8px}
.nav-links a{padding:6px 14px;font-size:.82em;font-weight:500;color:var(--text2);border-radius:8px;transition:all .2s;white-space:nowrap}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.05)}
.nav-links a.active{color:#fff;background:rgba(124,58,237,0.15)}
.header-actions{display:flex;align-items:center;gap:8px;margin-right:auto}
.search-wrap{display:none;position:relative;flex:1;max-width:480px}
.search-wrap.show{display:block}
.search-inner{display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;transition:all .3s}
.search-inner:focus-within{border-color:var(--prim2);background:rgba(255,255,255,0.08)}
.search-inner input{flex:1;background:transparent;border:none;padding:10px 16px;font-size:.88em;color:#fff;min-width:0}
.search-inner input::placeholder{color:var(--text3)}
.search-inner button{background:none;border:none;padding:10px 16px;color:var(--text2);font-size:1.1em;transition:color .2s}
.search-inner button:hover{color:#fff}
.search-dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:999;background:rgba(15,15,25,0.98);border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);max-height:380px;overflow-y:auto}
.search-dropdown.open{display:block}
.s-item{display:flex;align-items:center;gap:12px;padding:10px 14px;text-decoration:none;color:inherit;border-right:3px solid transparent;transition:border-color .25s,background .2s}
.s-item:hover{border-right-color:var(--prim2);background:rgba(255,255,255,0.03)}
.s-thumb{flex-shrink:0;width:36px;height:50px;border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04)}
.s-thumb img{width:100%;height:100%;object-fit:cover}
.s-info{flex:1;min-width:0}
.s-title{font-size:.82em;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-meta{margin-top:2px;font-size:.72em;color:var(--text3)}
.s-state{padding:24px 16px;text-align:center;font-size:.82em;color:var(--text3)}
.s-dots{display:flex;gap:5px;justify-content:center;margin-top:8px}
.s-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);animation:sdot 1s infinite ease-in-out}
.s-dots span:nth-child(2){animation-delay:.15s}
.s-dots span:nth-child(3){animation-delay:.3s}
@keyframes sdot{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-5px);opacity:1}}

.header-btn{background:none;border:none;color:var(--text2);padding:8px;border-radius:50%;transition:all .2s;font-size:1.2em;line-height:1}
.header-btn:hover{color:#fff;background:rgba(255,255,255,0.06)}
.header-btn.menu-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px}

.avatar-btn{width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.1);flex-shrink:0;background:var(--bg3)}
.avatar-btn img{width:100%;height:100%;object-fit:cover}

/* ── Mobile Menu ── */
.mobile-menu{position:fixed;top:var(--nav-h);left:0;right:0;z-index:99;background:rgba(0,0,0,0.97);backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,0.05);padding:12px 16px;display:none;animation:slideDown .25s var(--ease)}
.mobile-menu.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mm-item{display:block;width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);color:var(--text2);padding:14px 20px;border-radius:12px;font-size:.9em;font-weight:600;cursor:pointer;transition:all .25s;text-align:right}
.mm-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.mm-item.active{background:rgba(124,58,237,0.12);color:var(--prim2);border-color:rgba(124,58,237,0.15)}
.mm-divider{height:1px;background:rgba(255,255,255,0.05);margin:8px 0}

/* ── Main Content ── */
main{margin-top:var(--nav-h);flex:1;min-height:calc(100vh - var(--nav-h))}
.view{display:none;animation:fadeIn .35s var(--ease)}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Hero ── */
.hero{position:relative;height:55vh;min-height:360px;max-height:600px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg)}
.hero-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,58,237,0.15),transparent),radial-gradient(ellipse 60% 40% at 80% 20%,rgba(99,102,241,0.08),transparent),radial-gradient(ellipse 50% 50% at 20% 80%,rgba(168,85,247,0.06),transparent);animation:heroPulse 8s ease-in-out infinite}
@keyframes heroPulse{0%,100%{opacity:.7}50%{opacity:1}}
.hero-grid{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,black,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,black,transparent 70%)}
.hero-orb{position:absolute;border-radius:50%;filter:blur(80px);z-index:0;animation:orbFloat 12s ease-in-out infinite}
.hero-orb:nth-child(2){width:500px;height:500px;background:rgba(124,58,237,0.12);top:-10%;left:10%;animation-delay:-4s}
.hero-orb:nth-child(3){width:400px;height:400px;background:rgba(99,102,241,0.08);bottom:-15%;right:5%;animation-delay:-8s}
.hero-orb:nth-child(4){width:350px;height:350px;background:rgba(168,85,247,0.06);top:40%;left:60%;animation-delay:-2s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(0.95)}}
.hero-gradient{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.6) 80%,#000)}
.hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 20px 28px;max-width:1400px;margin:0 auto;width:100%}
.hero-brand{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:12px;animation:heroFadeIn 1s ease both}
.hero-brand-icon{font-size:4em;line-height:1;background:linear-gradient(135deg,var(--prim2),var(--prim),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(124,58,237,0.3));animation:heroIconPulse 3s ease-in-out infinite}
@keyframes heroIconPulse{0%,100%{filter:drop-shadow(0 0 40px rgba(124,58,237,0.3))}50%{filter:drop-shadow(0 0 60px rgba(124,58,237,0.5))}}
.hero-brand-text{font-size:3.2em;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#fff 30%,var(--prim2) 70%,var(--prim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.hero-brand-sub{font-size:.95em;color:var(--text2);font-weight:400;margin-top:4px;letter-spacing:2px}
.hero-tags{display:none}
.hero-desc{display:none}
.hero-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px;animation:heroFadeIn 1s ease .3s both}
.hero-carousel{display:none}
@keyframes heroFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.hero-search-wrap{width:100%;max-width:480px;margin-top:16px;animation:heroFadeIn 1s ease .4s both}
.hero-search-inner{display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;transition:all .3s}
.hero-search-inner:focus-within{border-color:var(--prim2);background:rgba(255,255,255,0.08);box-shadow:0 0 30px rgba(124,58,237,0.1)}
.hero-search-inner input{flex:1;background:transparent;border:none;padding:14px 20px;font-size:1em;color:#fff;min-width:0}
.hero-search-inner input::placeholder{color:var(--text3)}
.hero-search-inner button{background:linear-gradient(135deg,var(--prim),#6d28d9);border:none;padding:10px 20px;color:#fff;font-size:.9em;font-weight:600;border-radius:100px;margin:4px;cursor:pointer;transition:all .2s}
.hero-search-inner button:hover{box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.hero-quote{font-size:.85em;color:var(--text2);font-weight:400;font-style:italic;margin-top:12px;opacity:.7;animation:heroFadeIn 1s ease .5s both;max-width:480px;text-align:center;line-height:1.6}

/* ── Sections ── */
.section{padding:20px 16px 8px;max-width:1400px;margin:0 auto}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-header h2{font-size:1.15em;font-weight:700;color:#fff}
.section-count{font-size:.7em;padding:2px 12px;border-radius:100px;background:rgba(255,255,255,0.06);color:var(--text2)}

/* ── Swiper Overrides ── */
.swiper{width:100%;overflow:visible;cursor:grab}
.swiper:active{cursor:grabbing}
.swiper-wrapper{gap:0}
.swiper-slide{width:auto;flex-shrink:0}
.swiper-button-next,.swiper-button-prev{display:none}

/* ── Anime Card ── */
.anime-card{width:160px;border-radius:var(--radius);overflow:hidden;background:var(--card-bg);border:1px solid var(--card-border);transition:all .25s var(--ease);cursor:pointer;flex-shrink:0}
.anime-card:hover{border-color:var(--card-hover-border);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.anime-card .thumb-wrap{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--bg3)}
.anime-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
.anime-card:hover .thumb-wrap img{transform:scale(1.05)}
.anime-card .badge{position:absolute;top:6px;right:6px;font-size:.6em;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);color:#fff}
.anime-card .badge.ep{background:rgba(47,200,103,0.2);color:var(--green)}
.anime-card .badge.rating{left:6px;right:auto;background:rgba(251,191,36,0.15);color:var(--gold)}
.anime-card .info{padding:10px 12px 12px}
.anime-card .info .title{font-size:.78em;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.anime-card .info .meta{font-size:.65em;color:var(--text3);display:flex;align-items:center;gap:6px}

/* ── Card Grid ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card-grid .anime-card{width:100%}

/* ── Browse / Search ── */
.browse-header{padding:16px;max-width:1400px;margin:0 auto;width:100%}
.browse-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px}
.browse-select,.browse-input{padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:.82em}
.browse-select option{background:#111}
.browse-input{flex:1;min-width:120px;max-width:240px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 18px;background:var(--prim);color:#fff;border:none;border-radius:8px;font-size:.82em;font-weight:600;transition:all .2s}
.btn:hover{background:#6d28d9}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;background:transparent;color:var(--text2);border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-size:.82em;font-weight:500;transition:all .2s}
.btn-outline:hover{color:#fff;border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04)}
.btn-sm{padding:6px 14px;font-size:.78em}
.browse-filters{background:var(--bg2);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-top:10px}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:.72em;color:var(--text3);font-weight:500}
.filter-group select{min-width:100px}
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;margin:24px 0}
.page-btn{padding:8px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:.82em;transition:all .2s}
.page-btn:hover{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.2)}
.page-current{color:var(--text2);font-size:.88em;font-weight:600}

/* ── Episode View ── */
.ep-hero{display:flex;gap:20px;padding:16px;max-width:1400px;margin:0 auto;align-items:flex-start;flex-wrap:wrap}
.ep-poster{width:200px;flex-shrink:0;border-radius:12px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.04)}
.ep-poster img{width:100%;display:block;aspect-ratio:2/3;object-fit:cover}
.ep-info{flex:1;min-width:200px}
.ep-info h2{font-size:1.4em;font-weight:800;color:#fff;letter-spacing:-.3px;margin-bottom:6px}
.ep-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ep-meta span{font-size:.75em;padding:4px 12px;border-radius:100px;background:rgba(255,255,255,0.05);color:var(--text2);display:flex;align-items:center;gap:4px}
.eps-wrap{max-width:1400px;margin:0 auto;padding:0 16px 20px}
.eps-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.eps-header h3{font-size:1.1em;font-weight:700}
.eps-count{font-size:.7em;color:var(--text3);background:rgba(255,255,255,0.05);padding:2px 10px;border-radius:100px}
.eps-actions{display:flex;gap:8px;align-items:center}
.eps-actions input{width:70px;padding:8px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:.82em;text-align:center}
.eps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.ep-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;cursor:pointer;transition:all .2s}
.ep-item:hover{background:rgba(124,58,237,0.08);border-color:rgba(124,58,237,0.15)}
.ep-num{flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(124,58,237,0.1);color:var(--prim2);font-size:.78em;font-weight:700}
.ep-name{flex:1;font-size:.82em;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-arrow{color:var(--text3);font-size:.7em}

/* ── Player ── */
.player-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;padding:16px}
.player-overlay.show{display:flex}
.player-box{width:100%;max-width:900px;background:#000;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);box-shadow:0 32px 80px rgba(0,0,0,0.8);display:none}
.player-box.show{display:block;animation:fadeIn .3s var(--ease)}
.player-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.04)}
.player-top span{font-size:.88em;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-close{background:none;border:none;color:var(--text2);font-size:1.5em;padding:0 4px;transition:color .2s;line-height:1}
.player-close:hover{color:#fff}
.player-wrap{position:relative;aspect-ratio:16/9;background:#000}
.player-wrap video,.player-wrap iframe{width:100%;height:100%;display:block}
.player-wrap .hidden{display:none}
.player-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.85);z-index:5;transition:opacity .3s}
.player-loading.hidden{display:none}
.player-loading p{font-size:.85em;color:var(--text2)}
.player-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-top:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.pbtn{background:none;border:none;color:var(--text2);font-size:.88em;padding:6px 10px;border-radius:6px;transition:all .2s}
.pbtn:hover{color:#fff;background:rgba(255,255,255,0.06)}
.pbtn-play{font-size:1.1em}
.progress-wrap{flex:1;min-width:80px}
.progress-wrap input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;outline:none;background-image:linear-gradient(to right,var(--prim2) 0%,var(--prim2) 0%,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.08) 100%)}
.progress-wrap input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:4px}
.progress-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--prim2);border:2px solid var(--prim2);cursor:pointer;margin-top:-5px;box-shadow:0 0 12px rgba(167,139,250,0.3)}
.progress-wrap input[type=range]::-moz-range-track{height:4px;border-radius:4px;background:rgba(255,255,255,0.08)}
.progress-wrap input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--prim2);border:2px solid var(--prim2);cursor:pointer}
.time-display{font-size:.75em;color:var(--text3);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ── Loading / Toast ── */
.loading{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);flex-direction:column;gap:12px}
.loading.show{display:flex}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--prim2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.82em;color:var(--text2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:400;background:rgba(20,20,30,0.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 24px;font-size:.85em;color:#fff;box-shadow:0 12px 40px rgba(0,0,0,0.4);display:none;transition:all .3s var(--ease);white-space:nowrap;max-width:90vw;text-align:center;overflow:hidden;text-overflow:ellipsis}
.toast.show{display:block;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(239,68,68,0.2)}

.scroll-top{position:fixed;bottom:24px;right:24px;z-index:50;width:40px;height:40px;border-radius:50%;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.2);color:var(--prim2);font-size:1.2em;display:none;align-items:center;justify-content:center;transition:all .3s}
.scroll-top.show{display:flex}
.scroll-top:hover{background:rgba(124,58,237,0.25)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state p{font-size:.95em;margin-bottom:4px}
.empty-state small{font-size:.8em}

/* ── Responsive ── */
@media(min-width:768px){
  .search-wrap{display:block}
  .search-mobile-btn{display:none!important}
  .nav-links{display:flex}
  .header-btn.menu-btn{display:none}
  .hero-desc{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hero{height:55vh;min-height:380px;max-height:550px}
  .hero-content{padding:32px 40px 24px}
  .hero-brand-text{font-size:3em}
  .hero-carousel{padding:0 40px 16px}
  .anime-card{width:180px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
  .section{padding:28px 40px 12px}
  .section-header h2{font-size:1.25em}
  .browse-header{padding:24px 40px}
  .ep-hero{padding:24px 40px}
  .ep-poster{width:220px}
  .eps-wrap{padding:0 40px 24px}
}
@media(min-width:1024px){
  header{padding:0 32px}
  .hero-content{padding:40px 40px 32px}
  .hero-brand-text{font-size:4em}
  .hero{height:60vh;min-height:400px;max-height:650px}
  .section{padding:32px 48px 16px}
  .anime-card{width:200px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px}
}
@media(max-width:480px){
  .hero-content{padding:20px 12px 20px}
  .hero-logo{height:36px;max-width:90%}
  .hero-tags{font-size:.7em;gap:6px}
  .hero-tag svg{width:14px;height:14px}
  .hero-brand-text{font-size:2em}
  .hero-brand-icon{font-size:2.5em}
  .hero-search-wrap{max-width:90%}
  .hero-search-inner input{padding:10px 14px;font-size:.9em}
  .hero-quote{font-size:.78em}
  .btn-primary{padding:8px 18px;font-size:.82em;gap:6px}
  .hero-carousel{gap:3px;padding:0 12px 8px}
  .hero-dot.active{width:36px}
  .hero-dot{min-width:8px}
  .anime-card{width:140px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .anime-card .info{padding:8px 10px}
  .anime-card .info .title{font-size:.72em}
  .anime-card .info .meta{font-size:.6em}
  .swiper-button-next,.swiper-button-prev{display:none}
  .section{padding:14px 10px 6px}
  .section-header h2{font-size:1em}
  .ep-hero{gap:12px;padding:12px}
  .ep-poster{width:130px}
  .ep-info h2{font-size:1.1em}
  .eps-grid{grid-template-columns:1fr}
  .browse-header{padding:12px}
  .browse-toolbar{gap:6px}
  .filter-row{gap:6px}
  .filter-group select{min-width:80px;font-size:.75em}
  .player-overlay{padding:8px}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header id="header">
    <div class="header-inner">
      <button class="header-btn menu-btn" id="menuBtn" aria-label="القائمة">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <button class="header-btn" id="backBtn" aria-label="رجوع" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>

      <a href="/" class="logo" id="logoLink">
        <span>Anime Hub</span>
      </a>

      <div class="nav-links" id="navLinks">
        <a href="#" class="active" data-view="home">الرئيسية</a>

      <div class="search-wrap" id="searchWrap">
        <div class="search-inner">

        </div>
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>

      <div class="header-actions">
        <button class="header-btn search-mobile-btn" id="searchMobileBtn" aria-label="بحث">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button class="avatar-btn" id="avatarBtn" aria-label="حساب">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:4px auto;display:block"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>

    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mm-item active" data-view="home">🏠 الرئيسية</button>
    <button class="mm-item" data-view="browse">📚 المكتبة</button>
    <button class="mm-item" data-view="schedule">📅 الجدول</button>
    <div class="mm-divider"></div>
    <button class="mm-item" data-view="search">🔍 بحث</button>
  </div>

  <!-- Main -->
  <main>
    <!-- Home View -->
    <div class="view active" id="homeView">
      <div class="hero" id="hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-grid"></div>
        <div class="hero-orb"></div>
        <div class="hero-orb"></div>
        <div class="hero-orb"></div>
        <div class="hero-gradient"></div>
        <div class="hero-content">
          <div class="hero-brand">
            <div class="hero-brand-icon">🎬</div>
            <div class="hero-brand-text">Anime Hub</div>
            <div class="hero-brand-sub">شاهد الأنمي المفضل لديك</div>
          </div>
          <div class="hero-search-wrap">
            <div class="hero-search-inner">
              <input type="text" id="heroSearchInput" placeholder="ابحث عن أنمي..." autocomplete="off">
              <button id="heroSearchBtn">بحث</button>
            </div>
          </div>
          <div class="hero-quote">الأنمي ليس مجرد رسوم متحركة، إنه عالم من المشاعر والمغامرة</div>
          <div class="hero-tags" id="heroTags"></div>
          <p class="hero-desc" id="heroDesc"></p>
          <div class="hero-actions"></div>
        </div>

      </div>

      <div id="sections"></div>
    </div>

    <!-- Browse View -->
    <div class="view" id="browseView">
      <div class="browse-header">
        <div class="section-header" style="margin-bottom:0">
          <h2>المكتبة</h2>
          <span class="section-count" id="browseCount">0</span>

        <div class="browse-toolbar">
          <button class="btn-outline btn-sm" id="refreshBtn">⟳</button>
          <select class="browse-select" id="sortSelect">
            <option value="latest_first">الأحدث</option>
            <option value="oldest_first">الأقدم</option>
            <option value="name_az">الاسم أ-ي</option>
            <option value="name_za">الاسم ي-أ</option>
            <option value="rating">التقييم</option>
          </select>
          <input class="browse-input" id="browseKeyword" placeholder="بحث في المكتبة...">
          <button class="btn-outline btn-sm" id="filterBtn">🔽 تصفية</button>
        </div>
        <div class="browse-filters hidden" id="filterPanel">
          <div class="filter-row">
            <div class="filter-group"><label>الموسم</label><select class="browse-select" id="fSeason"><option value="">الكل</option><option value="Winter">الشتاء</option><option value="Spring">الربيع</option><option value="Summer">الصيف</option><option value="Fall">الخريف</option></select></div>
            <div class="filter-group"><label>النوع</label><select class="browse-select" id="fType"><option value="">الكل</option><option value="TV">TV</option><option value="Movie">فيلم</option><option value="ONA">ONA</option><option value="OVA">OVA</option><option value="Special">Special</option></select></div>
            <div class="filter-group"><label>الحالة</label><select class="browse-select" id="fStatus"><option value="">الكل</option><option value="Currently Airing">يعرض الآن</option><option value="Finished Airing">مكتمل</option></select></div>
            <div class="filter-group"><label>السنة</label><select class="browse-select" id="fYear"><option value="">الكل</option><option value="2027">2027</option><option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option><option value="2022">2022</option><option value="2021">2021</option><option value="2020">2020</option></select></div>

    <!-- Search View -->

      <div class="section-header" style="padding:16px;max-width:1400px;margin:0 auto">
        <h2>نتائج البحث</h2>
        <span class="section-count" id="searchCount">0</span>

      <div class="card-grid" id="searchGrid" style="padding:0 16px;max-width:1400px;margin:0 auto"></div>

</div>

<script>
// ── State ──
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

let state = {
  slug: null,
  animeName: '',
  episodes: [],
  urls: [],
  browsePage: 1,
  timer: null
};
let _hls = null;

// ── DOM refs ──
const header = $('header');
const menuBtn = $('menuBtn');
const mobileMenu = $('mobileMenu');
const searchWrap = $('searchWrap');
const searchInput = $('searchInput');
const searchBtn = $('searchBtn');
const searchDropdown = $('searchDropdown');
const searchMobileBtn = $('searchMobileBtn');
const avatarBtn = $('avatarBtn');
const navLinks = $('navLinks');
const logoLink = $('logoLink');

const homeView = $('homeView');
const browseView = $('browseView');
const scheduleView = $('scheduleView');
const searchView = $('searchView');
const episodeView = $('episodeView');

const hero = $('hero');
const heroTags = $('heroTags');
const heroDesc = $('heroDesc');
const heroCarousel = $('heroCarousel');
const sections = $('sections');

const browseGrid = $('browseGrid');
const browseCount = $('browseCount');
const browsePages = $('browsePages');
const sortSelect = $('sortSelect');
const browseKeyword = $('browseKeyword');
const refreshBtn = $('refreshBtn');
const filterBtn = $('filterBtn');
const filterPanel = $('filterPanel');
const fSeason = $('fSeason');
const fType = $('fType');
const fStatus = $('fStatus');
const fYear = $('fYear');
const applyFilter = $('applyFilter');
const resetFilter = $('resetFilter');

const searchGrid = $('searchGrid');
const searchCount = $('searchCount');

const epPoster = $('epPoster');
const epTitle = $('epTitle');
const epMeta = $('epMeta');
const epCount = $('epCount');
const epInput = $('epInput');
const epList = $('epList');
const epBackBtn = $('epBackBtn');
const watchBtn = $('watchBtn');

const playerOverlay = $('playerOverlay');
const playerBox = $('playerBox');
const playerTitle = $('playerTitle');
const playerVideo = $('playerVideo');
const playerIframe = $('playerIframe');
const playerLoading = $('playerLoading');
const videoSource = $('videoSource');
const playBtn = $('playBtn');
const rewindBtn = $('rewindBtn');
const forwardBtn = $('forwardBtn');
const progressBar = $('progressBar');
const timeDisplay = $('timeDisplay');
const fullscreenBtn = $('fullscreenBtn');
const playerClose = $('playerClose');

const loading = $('loading');
const toast = $('toast');
const scrollTop = $('scrollTop');
const backBtn = $('backBtn');

// ── Utils ──
const CORS_PROXIES = ['https://corsproxy.io/?url=', 'https://api.allorigins.win/raw?url='];
const API_BASE = 'https://animeslayer.to';

function isFlaskAvailable() { return location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.port === '5000'; }

async function apiFetch(path) {
  if (isFlaskAvailable()) {
    try {
      const r = await fetch(path);
      if (r.ok) return r.json();
    } catch(e) {}
  }
  // Fallback: direct via CORS proxy
  let url;
  const qp = new URLSearchParams(path.split('?')[1] || '');
  if (path.startsWith('/api/search')) {
    url = API_BASE + '/api/search.php?q=' + encodeURIComponent(qp.get('title') || '');
  } else if (path.startsWith('/api/browse')) {
    const p = {_api: 1, order_by: qp.get('order_by') || 'latest_first', page: qp.get('page') || '1'};
    ['keyword','season','type','status','year'].forEach(k => { const v = qp.get(k); if (v) p[k] = v; });
    url = API_BASE + '/browse?' + new URLSearchParams(p);
  }
  else if (path.startsWith('/api/homepage')) url = API_BASE + '/browse?_api=1&order_by=latest_first&page=1';
  else throw new Error('Unsupported path: ' + path);
  const errors = [];
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url));
      if (!r.ok) continue;
      const data = await r.json();
      if (path.startsWith('/api/homepage')) {
        if (Array.isArray(data)) return data;
        if (data.success) return [
          {label: '🆕 أحدث الأنمي', items: (data.data || []).slice(0, 18).map(formatBrowseItem)},
          {label: '📺 يعرض الآن', items: (data.data || []).filter(x => x.anime_status === 'Currently Airing').slice(0, 18).map(formatBrowseItem)}
        ];
      }
      if (path.startsWith('/api/browse')) return data;
      if (path.startsWith('/api/search')) return {found: data.length ? 1 : 0, results: data.map(s => ({title: s.title, slug: s.href?.replace('/title/', '') || '', image: s.image || '', type: s.type || '', year: s.year || '', rating: s.rating || ''}))};
      return data;
    } catch(e) { errors.push(e.message); }
  }
  throw new Error(errors.join('; '));
}

function formatBrowseItem(item) {
  const slug = (item.anime_name || '').toLowerCase().replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-').replace(/-+/g, '-') + '-' + (item.anime_id ? String.fromCharCode(97 + (item.anime_id % 26)) : 'x');
  return {
    title: item.anime_name,
    slug: slug,
    image: item.anime_cover_image_url || '',
    type: item.anime_type || '',
    status: item.anime_status || '',
    year: item.anime_release_year || '',
    season: item.anime_season || '',
    rating: item.anime_rating || '',
    genres: item.anime_genres || ''
  };
}
function showToast(msg, type = 'err') {
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  clearTimeout(toast._h);
  toast._h = setTimeout(() => toast.classList.remove('show'), 3500);
}

function showLoading() { loading.classList.add('show'); }
function hideLoading() { loading.classList.remove('show'); }

function showView(view, pushHistory = true) {
  $$('.view').forEach(v => v.classList.remove('active'));
  view.classList.add('active');
  $$('[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view.id.replace('View', ''));
  });
  if (pushHistory) {
    viewHistory.push(view.id);
    backBtn.style.display = viewHistory.length > 1 ? 'flex' : 'none';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function cardHTML(item, opts = {}) {
  const img = item.image || item.anime_cover_image_url || '';
  const t = item.title || item.anime_name || '?';
  const tp = item.type || item.anime_type || 'أنمي';
  const yr = item.year || item.anime_release_year || '';
  const r = item.rating || item.anime_rating || null;
  const s = item.slug || '';
  const ep = item.episode || item.episode_number || item.latest_episode || '';
  const epLabel = item.episode_label || (ep ? 'الحلقة ' + ep : '');
  const fb = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 280'%3E%3Crect fill='%23131324' width='200' height='280'/%3E%3Ctext x='100' y='140' text-anchor='middle' fill='%2394a3b8' font-size='40'%3E${t.charAt(0)}%3C/text%3E%3C/svg%3E`;
  const clickAttr = s ? `onclick="pickAnime('${s}','${img.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}','${tp.replace(/'/g,"\\'")}','${yr}','${r||''}')"` : '';
  const w = opts.wide ? ' width:200px;' : '';
  return `<div class="anime-card"${clickAttr} style="${w}">
    <div class="thumb-wrap">
      <img src="${img}" alt="${t}" loading="lazy" onerror="this.src='${fb}'">
      ${r ? '<span class="badge rating">★ ' + parseFloat(r).toFixed(1) + '</span>' : ''}
      ${epLabel ? '<span class="badge ep">' + epLabel + '</span>' : ''}
    </div>
    <div class="info">
      <div class="title">${t}</div>
      <div class="meta"><span>${tp}</span>${yr ? '<span>• ' + yr + '</span>' : ''}</div>
    </div>
  </div>`;
}

function skeleton(n = 8) {
  return '<div style="display:flex;gap:12px;overflow:hidden">' +
    Array(n).fill('<div style="width:160px;flex-shrink:0"><div style="aspect-ratio:2/3;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:8px"></div><div style="height:14px;width:70%;background:rgba(255,255,255,0.04);border-radius:4px;margin-bottom:6px"></div><div style="height:10px;width:50%;background:rgba(255,255,255,0.03);border-radius:4px"></div></div>').join('') +
    '</div>';
}

// ── Scroll events ──
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  header.classList.toggle('scrolled', y > 30);
  scrollTop.classList.toggle('show', y > 400);
});
scrollTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── Back Button ──
const viewHistory = ['home'];
backBtn.addEventListener('click', () => {
  viewHistory.pop();
  const prev = viewHistory.pop() || 'home';
  switchView(prev);
  viewHistory.push(prev);
});

// ── Nav ──
function switchView(viewId) {
  const views = { home: homeView, browse: browseView, schedule: scheduleView, search: searchView };
  if (views[viewId]) showView(views[viewId]);
  mobileMenu.classList.remove('open');
  if (viewId === 'browse') loadBrowse(1);
  if (viewId === 'home') loadHome();
}

document.querySelectorAll('[data-view]').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    switchView(el.dataset.view);
  });
});

menuBtn.addEventListener('click', () => {
  mobileMenu.classList.toggle('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('header') && !e.target.closest('.mobile-menu')) {
    mobileMenu.classList.remove('open');
  }
});

// ── Search ──
searchMobileBtn.addEventListener('click', () => {
  searchWrap.classList.toggle('show');
  if (searchWrap.classList.contains('show')) searchInput.focus();
});

let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { searchDropdown.classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSearchDropdown(q), 300);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q) { doSearchFull(q); searchDropdown.classList.remove('open'); }
  }
});

searchBtn.addEventListener('click', () => {
  const q = searchInput.value.trim();
  if (q) { doSearchFull(q); searchDropdown.classList.remove('open'); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchDropdown.classList.remove('open');
});

function doSearchDropdown(q) {
  const dd = searchDropdown;
  dd.innerHTML = '<div class="s-state"><div class="s-dots"><span></span><span></span><span></span></div></div>';
  dd.classList.add('open');
  apiFetch('/api/search?title=' + encodeURIComponent(q))
    .then(d => {
      if (d.found && d.results.length) {
        dd.innerHTML = d.results.slice(0, 6).map(item => {
          const img = item.image || '';
          const t = item.title || '?';
          const tp = item.type || '';
          return `<div class="s-item" onclick="pickAnime('${item.slug}','${img.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}','${tp.replace(/'/g,"\\'")}','${item.year||''}','${item.rating||''}');searchDropdown.classList.remove('open')">
            <div class="s-thumb"><img src="${img}" alt="${t}" onerror="this.parentElement.innerHTML=''"></div>
            <div class="s-info"><div class="s-title">${t}</div><div class="s-meta">${tp}${item.year ? ' • ' + item.year : ''}</div></div>
          </div>`;
        }).join('');
      } else {
        dd.innerHTML = '<div class="s-state">لا توجد نتائج</div>';
      }
    })
    .catch(() => {
      dd.innerHTML = '<div class="s-state">خطأ في البحث</div>';
    });
}

function doSearchFull(q) {
  showLoading();
  showView(searchView);
  const url = '/api/search?title=' + encodeURIComponent(q);
  apiFetch(url)
    .then(d => {
      hideLoading();
      if (d.found && d.results.length) {
        searchCount.textContent = d.results.length;
        searchGrid.innerHTML = d.results.map(item => cardHTML(item)).join('');
      } else {
        searchGrid.innerHTML = '<div class="empty-state"><p>لا توجد نتائج</p><small>حاول بكلمة مختلفة</small></div>';
        searchCount.textContent = '0';
      }
    })
    .catch(() => { hideLoading(); showToast('خطأ في الاتصال'); });
}

// ── Hero Search ──
const heroSearchInput = $('heroSearchInput');
const heroSearchBtn = $('heroSearchBtn');

heroSearchBtn.addEventListener('click', () => {
  const q = heroSearchInput.value.trim();
  if (q) { doSearchFull(q); }
});
heroSearchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = heroSearchInput.value.trim();
    if (q) { doSearchFull(q); }
  }
});

// ── Avatar ──
avatarBtn.addEventListener('click', () => {
  showToast('قريباً', '');
});

// ── Home Sections ──
function loadHome() {
  sections.innerHTML = skeleton(12);
  apiFetch('/api/homepage')
    .then(d => {
      sections.innerHTML = '';
      const data = Array.isArray(d) ? d : [];
      data.forEach((sec, si) => {
        const items = sec.items || [];
        if (!items.length) return;
        const el = document.createElement('div');
        el.className = 'section';
        el.id = 'sec-' + si;
        el.innerHTML = `<div class="section-header"><h2>${sec.label || 'قسم'}</h2><span class="section-count">${items.length}</span></div>
          <div class="swiper" data-sec="${si}"><div class="swiper-wrapper">${items.map(item => '<div class="swiper-slide">' + cardHTML(item) + '</div>').join('')}</div></div>`;
        sections.appendChild(el);
      });
      setTimeout(() => initSwipers(), 100);
    })
    .catch(() => {
      sections.innerHTML = '<div class="empty-state"><p>تعذر تحميل المحتوى</p><small>تحقق من اتصال الخادم</small></div>';
    });
}

function initSwipers() {
  document.querySelectorAll('.swiper').forEach((el, i) => {
    new Swiper(el, {
      slidesPerView: 'auto',
      spaceBetween: 10,
      freeMode: { enabled: true, momentum: true, momentumRatio: 0.8, momentumVelocityRatio: 0.6 },
      grabCursor: true,
      touchRatio: 1.2,
      resistanceRatio: 0.7,
      breakpoints: {
        480: { spaceBetween: 12 },
        768: { spaceBetween: 14 },
        1024: { spaceBetween: 16 }
      }
    });
  });
}

// ── Browse ──
refreshBtn.addEventListener('click', () => loadBrowse(state.browsePage));
sortSelect.addEventListener('change', () => loadBrowse(1));
browseKeyword.addEventListener('keydown', e => { if (e.key === 'Enter') loadBrowse(1); });
filterBtn.addEventListener('click', () => filterPanel.classList.toggle('hidden'));
applyFilter.addEventListener('click', () => loadBrowse(1));
resetFilter.addEventListener('click', () => {
  fSeason.value = fType.value = fStatus.value = fYear.value = '';
  browseKeyword.value = '';
  loadBrowse(1);
});

function loadBrowse(p) {
  state.browsePage = p;
  showLoading();
  const q = new URLSearchParams({ page: p, order_by: sortSelect.value });
  if (browseKeyword.value.trim()) q.set('keyword', browseKeyword.value.trim());
  if (fSeason.value) q.set('season', fSeason.value);
  if (fType.value) q.set('type', fType.value);
  if (fStatus.value) q.set('status', fStatus.value);
  if (fYear.value) q.set('year', fYear.value);
  apiFetch('/api/browse?' + q)
    .then(d => {
      hideLoading();
      if (d.success) {
        browseCount.textContent = d.total_min || (d.data || []).length;
        browseGrid.innerHTML = (d.data || []).map(item => cardHTML(item)).join('');
        browsePages.innerHTML = '';
        if (d.has_next || d.has_prev) {
          const w = document.createElement('div');
          w.style.cssText = 'display:flex;align-items:center;gap:12px';
          if (d.has_prev) {
            const b = document.createElement('button');
            b.className = 'page-btn';
            b.textContent = '← السابق';
            b.onclick = () => loadBrowse(p - 1);
            w.appendChild(b);
          }
          const c = document.createElement('span');
          c.className = 'page-current';
          c.textContent = p;
          w.appendChild(c);
          if (d.has_next) {
            const b = document.createElement('button');
            b.className = 'page-btn';
            b.textContent = 'التالي →';
            b.onclick = () => loadBrowse(p + 1);
            w.appendChild(b);
          }
          browsePages.appendChild(w);
        }
      } else {
        showToast(d.error || 'فشل التحميل');
      }
    })
    .catch(() => { hideLoading(); showToast('خطأ في الاتصال'); });
}

// ── Pick Anime ──
function pickAnime(s, img, title, tp, yr, rt) {
  state.slug = s;
  state.animeName = '';
  window._animeMeta = { image: img || '', title: title || '', type: tp || '', year: yr || '', rating: rt || '' };
  showLoading();
  let timedOut = false;
  const ft = setTimeout(() => { timedOut = true; showToast('الخادم يستغرق وقتاً طويلاً'); }, 12000);
  fetch('/api/episodes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slug: s }) })
    .then(r => r.json())
    .then(d => {
      clearTimeout(ft);
      if (timedOut) return;
      hideLoading();
      if (d.found) {
        state.episodes = d.episodes || [];
        state.animeName = d.name || '';
        showEpisodes();
      } else {
        showToast(d.message || 'تعذر التحميل');
      }
    })
    .catch(() => { clearTimeout(ft); hideLoading(); showToast('خطأ'); });
}

function showEpisodes() {
  const name = state.animeName || state.slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  showView(episodeView);
  const meta = window._animeMeta || {};
  epTitle.textContent = name;
  epPoster.src = meta.image || '';
  epPoster.alt = name;
  epMeta.innerHTML = `
    <span>📺 ${meta.type || 'أنمي'}</span>
    <span>📅 ${meta.year || '--'}</span>
    <span>⭐ ${meta.rating || '--'}</span>
  `;
  epCount.textContent = (state.episodes.length || '0');
  if (!state.episodes.length) {
    epList.innerHTML = '<div class="empty-state"><p>لا توجد حلقات</p></div>';
    return;
  }
  epList.innerHTML = state.episodes.map((e, i) => {
    const en = e.n || e.number || e.episode_number || e.num || e.episode || (i + 1);
    return `<div class="ep-item" onclick="playEpisode(${en})">
      <span class="ep-num">${en}</span>
      <span class="ep-name">${e.title || 'حلقة ' + en}</span>
      <span class="ep-arrow">▶</span>
    </div>`;
  }).join('');
  epInput.max = state.episodes.length;
}

epBackBtn.addEventListener('click', () => {
  viewHistory.pop();
  const prev = viewHistory.pop() || 'homeView';
  const target = $(prev);
  if (target) { showView(target, false); backBtn.style.display = viewHistory.length > 1 ? 'flex' : 'none'; }
  else { showView(homeView, false); viewHistory.push('homeView'); backBtn.style.display = 'none'; }
});

watchBtn.addEventListener('click', () => playEpisode());
epInput.addEventListener('keydown', e => { if (e.key === 'Enter') playEpisode(); });

function playEpisode(ep) {
  const n = ep || parseInt(epInput.value);
  if (!n || n < 1) { showToast('أدخل رقم حلقة صحيح'); return; }
  if (!state.slug) { showToast('اختر أنمي أولاً'); return; }
  showLoading();
  let timedOut = false;
  const ft = setTimeout(() => { timedOut = true; showToast('جلب الرابط يستغرق وقتاً'); }, 15000);
  fetch('/api/play', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slug: state.slug, episode: n }) })
    .then(r => r.json())
    .then(d => {
      clearTimeout(ft);
      if (timedOut) return;
      hideLoading();
      if (d.found && d.urls.length) {
        state.urls = d.urls;
        openPlayer(0);
      } else {
        showToast(d.message || 'لا توجد روابط');
      }
    })
    .catch(() => { clearTimeout(ft); hideLoading(); showToast('خطأ'); });
}

// ── Player ──
let _playerClosing = false;

function openPlayer(idx) {
  if (_playerClosing || idx >= state.urls.length) {
    if (idx >= state.urls.length) { showToast('كل السيرفرات متعطلة'); }
    closePlayer();
    return;
  }
  clearTimeout(state.timer);
  playerLoading.classList.remove('hidden');
  const url = state.urls[idx];
  const pName = state.animeName || state.slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  playerTitle.textContent = pName + ' — ' + url.server;
  playerOverlay.classList.add('show');
  playerBox.classList.add('show');

  if (url.url.includes('mega.nz')) {
    playerLoading.classList.add('hidden');
    playerVideo.classList.add('hidden');
    playerIframe.classList.remove('hidden');
    playerIframe.src = url.url;
    return;
  }
  playerIframe.classList.add('hidden');
  playerIframe.src = '';
  playerVideo.classList.remove('hidden');

  const isM3u8 = url.url.includes('.m3u8');
  if (isM3u8) {
    loadHls(url.url, playerVideo, ok => {
      if (_playerClosing) return;
      if (!ok) { playerLoading.classList.add('hidden'); showToast('هذا السيرفر غير متوافق'); openPlayer(idx + 1); return; }
      playerLoading.classList.add('hidden');
      startPlayback(true);
    });
    updatePlayBtn();
    return;
  }
  videoSource.src = url.url;
  playerVideo.load();
  playerLoading.classList.add('hidden');
  startPlayback(false);
}

function startPlayback(hls) {
  if (_playerClosing) return;
  playerVideo.currentTime = 0;
  updatePlayBtn();
  playerVideo.play().catch(() => {});
  if (!hls) {
    const currentUrl = videoSource.src || playerVideo.src;
    state.timer = setTimeout(() => {
      if (_playerClosing) return;
      if (playerVideo.readyState < 3) {
        playerVideo.pause();
        videoSource.src = '';
        playerVideo.load();
        showToast('بطيء، تجربة التالي...');
        const idx = state.urls.findIndex(u => u.url === currentUrl);
        openPlayer(idx >= 0 ? idx + 1 : state.urls.length);
      }
    }, 12000);
  }
}

playerVideo.addEventListener('playing', () => { clearTimeout(state.timer); playerLoading.classList.add('hidden'); hideLoading(); });
playerVideo.addEventListener('error', () => {
  if (_playerClosing) return;
  clearTimeout(state.timer);
  const idx = state.urls.findIndex(u => u.url === videoSource.src || u.url === (playerVideo.src || ''));
  if (idx >= 0) {
    showToast('فشل التحميل، تجربة السيرفر التالي...');
    openPlayer(idx + 1);
  }
});
playerVideo.addEventListener('stalled', () => {
  if (_playerClosing) return;
  clearTimeout(state.timer);
  state.timer = setTimeout(() => {
    if (_playerClosing) return;
    if (playerVideo.readyState < 3) {
      showToast('توقف التحميل، تجربة التالي...');
      const idx = state.urls.findIndex(u => u.url === videoSource.src || u.url === (playerVideo.src || ''));
      openPlayer(idx >= 0 ? idx + 1 : state.urls.length);
    }
  }, 8000);
});

function loadHls(urlEl, videoEl, cb) {
  if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = urlEl;
    videoEl.load();
    if (cb) cb(true);
    return;
  }
  if (window.Hls && Hls.isSupported()) {
    videoEl.src = '';
    if (_hls) { _hls.destroy(); _hls = null; }
    _hls = new Hls({
      enableWorker: true,
      lowLatencyMode: false,
      fragLoadingTimeOut: 8000,
      manifestLoadingTimeOut: 8000,
      fragLoadingMaxRetry: 2,
      manifestLoadingMaxRetry: 2,
      fragLoadingRetryDelay: 500
    });
    _hls.loadSource(urlEl);
    _hls.attachMedia(videoEl);
    _hls.on(Hls.Events.MANIFEST_PARSED, () => {
      if (_playerClosing) return;
      videoEl.play().catch(() => {});
      if (cb) cb(true);
    });
    _hls.on(Hls.Events.ERROR, (event, data) => {
      if (_playerClosing) return;
      if (data.fatal) {
        if (_hls) { _hls.destroy(); _hls = null; }
        const idx = state.urls.findIndex(u => u.url === urlEl);
        if (idx >= 0 && idx + 1 < state.urls.length) {
          showToast('السيرفر لا يعمل، تجربة التالي...');
          openPlayer(idx + 1);
        } else {
          hideLoading();
          showToast('كل السيرفرات متعطلة');
          closePlayer();
        }
      }
    });
    return;
  }
  if (cb) cb(false);
}

function updatePlayBtn() {
  playBtn.textContent = playerVideo.paused ? '▶' : '⏸';
}

playBtn.addEventListener('click', () => {
  playerVideo.paused ? playerVideo.play() : playerVideo.pause();
});
playerVideo.addEventListener('play', updatePlayBtn);
playerVideo.addEventListener('pause', updatePlayBtn);

rewindBtn.addEventListener('click', () => {
  playerVideo.currentTime = Math.max(0, playerVideo.currentTime - 10);
});
forwardBtn.addEventListener('click', () => {
  playerVideo.currentTime = Math.min(playerVideo.duration || 0, playerVideo.currentTime + 10);
});

function updateProgress() {
  if (!playerVideo.duration) return;
  const pct = (playerVideo.currentTime / playerVideo.duration) * 100;
  progressBar.value = pct * 10;
  timeDisplay.textContent = formatTime(playerVideo.currentTime) + ' / ' + formatTime(playerVideo.duration);
  progressBar.style.background = 'linear-gradient(to right,var(--prim2) 0%,var(--prim2) ' + pct + '%,rgba(255,255,255,0.08) ' + pct + '%,rgba(255,255,255,0.08) 100%)';
}
playerVideo.addEventListener('timeupdate', updateProgress);

progressBar.addEventListener('input', () => {
  if (!playerVideo.duration) return;
  const pct = (progressBar.value / 1000) * 100;
  playerVideo.currentTime = (progressBar.value / 1000) * playerVideo.duration;
  progressBar.style.background = 'linear-gradient(to right,var(--prim2) 0%,var(--prim2) ' + pct + '%,rgba(255,255,255,0.08) ' + pct + '%,rgba(255,255,255,0.08) 100%)';
});

fullscreenBtn.addEventListener('click', () => {
  const el = playerVideo.classList.contains('hidden') ? playerIframe : playerVideo;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
  }
});

playerClose.addEventListener('click', closePlayer);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePlayer(); return; }
  if (!playerOverlay.classList.contains('show')) return;
  if (playerVideo.classList.contains('hidden')) return;
  if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); playerVideo.paused ? playerVideo.play() : playerVideo.pause(); }
  if (e.key === 'ArrowLeft') { playerVideo.currentTime = Math.max(0, playerVideo.currentTime - 10); }
  if (e.key === 'ArrowRight') { playerVideo.currentTime = Math.min(playerVideo.duration || 0, playerVideo.currentTime + 10); }
  if (e.key === 'f' || e.key === 'F') { fullscreenBtn.click(); }
});

function closePlayer() {
  _playerClosing = true;
  clearTimeout(state.timer);
  if (_hls) { try { _hls.destroy(); } catch(e) {} _hls = null; }
  try {
    playerVideo.pause();
    playerVideo.removeAttribute('src');
    playerVideo.load();
  } catch(e) {}
  playerIframe.src = '';
  playerVideo.classList.add('hidden');
  playerLoading.classList.add('hidden');
  playerOverlay.classList.remove('show');
  playerBox.classList.remove('show');
  hideLoading();
  if (document.fullscreenElement) try { document.exitFullscreen?.(); } catch(e) {}
  setTimeout(() => { _playerClosing = false; playerVideo.classList.remove('hidden'); }, 300);
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  progressBar.style.background = 'linear-gradient(to right,var(--prim2) 0%,var(--prim2) 0%,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.08) 100%)';
  loadHome();
});
</script>
